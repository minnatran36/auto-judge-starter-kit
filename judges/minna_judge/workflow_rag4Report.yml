# workflow_rag4Report.yml
# For evaluating rag4reports-2026 systems (e.g. adventure-continue).
#
# FIX: class paths updated from minna_judge.minna_judge → minna_judge.minna_judge_rag4Report
# The original workflow.yml pointed to the old file (written for anise/kiddie format).
# minna_judge_rag4Report.py contains the document injection fix needed for
# adventure-style runs where doc text is not embedded in the Report object.

nugget_class: "judges.minna_judge.minna_judge_rag4Report:MinnaNuggetCreator"
qrels_class:  "judges.minna_judge.minna_judge_rag4Report:MinnaQrelsCreator"
judge_class:  "judges.minna_judge.minna_judge_rag4Report:MinnaLeaderboardJudge"

# =============================================================================
# Lifecycle Flags
# =============================================================================

create_nuggets: true
create_qrels: false        # disabled — RESPONSE_NUGGET_SCORE removed from leaderboard
judge: true

nugget_depends_on_responses: true
judge_uses_nuggets: true
judge_uses_qrels: false    # disabled — qrels output no longer used in judge stage
qrels_uses_nuggets: true

force_recreate_nuggets: false
force_recreate_qrels: false

augment_report: false


# =============================================================================
# Default Settings
# =============================================================================

settings:
  filebase: "minna_judge_rag4report_new"   
                                        

# =============================================================================
# Phase-Specific Settings
# =============================================================================

nugget_settings:
  max_nuggets: 10

qrels_settings:
  grade_range: [0, 3]
  length_threshold: 100

judge_settings:
  on_missing_evals: "fix_aggregate"


# =============================================================================
# Variants
# =============================================================================

variants:
  strict:
    nugget_settings:
      max_nuggets: 5

  lenient:
    qrels_settings:
      length_threshold: 50

  judge-only:
    create_nuggets: false
    create_qrels: false
    judge_uses_nuggets: false
    judge_uses_qrels: false


# =============================================================================
# Parameter Sweeps
# =============================================================================

sweeps:
  grid-search:
    nugget_settings:
      max_nuggets: [2, 3, 5]